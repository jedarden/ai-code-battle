apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: acb-webhook
  namespace: ai-code-battle
  labels:
    app.kubernetes.io/name: acb-webhook
    app.kubernetes.io/part-of: ai-code-battle
    app.kubernetes.io/component: ci
spec:
  service:
    ports:
      - port: 12000
        targetPort: 12000
  webhook:
    acb-push:
      port: "12000"
      endpoint: /push
      method: POST
